<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #202124;
            color: #e8eaed;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 40px;
        }

        .error-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 24px;
            opacity: .8;
        }

        .error-icon svg {
            width: 100%;
            height: 100%;
            fill: #9aa0a6;
        }

        h1 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 16px;
            color: #e8eaed;
        }

        p {
            font-size: 1rem;
            color: #bdc1c6;
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .domain {
            color: #8ab4f8;
            font-weight: 500;
        }

        .error-code {
            margin-top: 20px;
            color: #9aa0a6;
            font-size: 14px;
            letter-spacing: .5px;
        }

        .reload-btn {
            margin-top: 35px;
            background: #8ab4f8;
            color: #202124;
            border: none;
            padding: 12px 28px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: .3s;
        }

        .reload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(138, 180, 248, .25);
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="error-icon">
            <svg viewBox="0 0 24 24">
                <path
                    d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm8 1.5V8h4.5L14 3.5zM8 17h8v2H8v-2zm1-5c0-1.66 1.34-3 3-3s3 1.34 3 3h-2a1 1 0 1 0-2 0H9z" />
            </svg>
        </div>

        <h1>This site can't be reached</h1>

        <p>
            If spelling is correct, try running network diagnostics.
        </p>

        <div class="error-code">
            DNS_PROBE_FINISHED_NXDOMAIN
        </div>

        <button class="reload-btn" onclick="location.reload()">
            Reload
        </button>

    </div>

    <script>
        console.log("404 page not found error contact admin");
        console.error("404 page not found error contact admin");
    </script>

</body>

</html>
